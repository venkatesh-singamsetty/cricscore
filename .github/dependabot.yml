version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/backend/lambdas/match-api"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/backend/lambdas/score-update"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/backend/lambdas/broadcaster"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/backend/lambdas/storage-worker"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
    groups:
      dependencies:
        patterns:
          - "*"

  - package-ecosystem: "terraform"
    directory: "/terraform"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns:
          - "*"
